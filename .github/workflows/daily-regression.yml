name: Daily Regression Tests

on:
  schedule:
    - cron: '0 6 * * *'  # 6am UTC daily
  workflow_dispatch:

jobs:
  login-suite:
    name: Login Suite
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: Login

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: Login/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Login tests
        run: npx playwright test
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
          TEST_USER2_EMAIL: ${{ secrets.TEST_USER2_EMAIL }}
          TEST_USER2_PASSWORD: ${{ secrets.TEST_USER2_PASSWORD }}
          SYNTHQA_WEBHOOK_URL: ${{ secrets.SYNTHQA_WEBHOOK_URL }}
          SYNTHQA_API_KEY: ${{ secrets.SYNTHQA_API_KEY }}
          SYNTHQA_SUITE_ID: ${{ secrets.LOGIN_SUITE_ID }}

      - name: Upload Login report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: login-report-${{ github.run_number }}
          path: Login/playwright-report/
          retention-days: 30

  generation-suite:
    name: Generation Suite
    runs-on: ubuntu-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: Generate

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: Generate/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Generate tests
        run: npx playwright test
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
          SYNTHQA_WEBHOOK_URL: ${{ secrets.SYNTHQA_WEBHOOK_URL }}
          SYNTHQA_API_KEY: ${{ secrets.SYNTHQA_API_KEY }}
          SYNTHQA_SUITE_ID: ${{ secrets.GENERATION_SUITE_ID }}
          USER_EMAIL: ${{ secrets.USER_EMAIL }}
          USER_PASSWORD: ${{ secrets.USER_PASSWORD }}


      - name: Upload Generate report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: generation-report-${{ github.run_number }}
          path: Generate/playwright-report/
          retention-days: 30
